<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Borrador Defensa UCM</title>
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <div id="presentation-shell">
      <div id="presentation-container" aria-live="polite">
        <main id="slide-track" class="slide-track">
          <div class="loading-state">Cargando presentación...</div>
        </main>

        <div class="nav-bar">
          <div class="counter" id="page-counter">01</div>
          <div class="progress-container" aria-hidden="true">
            <div class="progress-fill" id="progress-bar"></div>
          </div>
          <div class="brand-lockup" aria-label="Marca institucional UCM">
            <img
              class="brand-shield"
              src="https://upload.wikimedia.org/wikipedia/commons/9/91/Escudo_de_la_Universidad_Complutense_de_Madrid.svg"
              alt="Escudo oficial UCM"
            />
            <div class="brand-text">
              <p>Universidad Complutense de Madrid</p>
              <p>Facultad de Ciencias de la Información</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <noscript>
      <p class="noscript-warning">Activa JavaScript para visualizar la presentación.</p>
    </noscript>

    <script src="assets/js/presentation.js" defer></script>
  </body>
</html>
